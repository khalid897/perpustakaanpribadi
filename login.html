<!DOCTYPE html>
<html>
<head>
  <title>Login Admin</title>
  <style>
    body { font-family: sans-serif; background: linear-gradient(135deg, #00C9FF, #92FE9D); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 16px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.15);}
    input, button { padding: 10px; margin: 8px 0; width: 90%; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #00C9FF; color: white; font-weight: bold; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Login Admin</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Masuk</button>
  </div>
  <script>
    function login(){
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;
      if(user && pass){
        localStorage.setItem("login", "true");
        window.location.href = "admin-koleksi.html";
      } else {
        alert("Isi semua kolom!");
      }
    }
  </script>
</body>
</html>
