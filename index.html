<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Perpustakaan Pribadi</title>
  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #00C9FF, #92FE9D);
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .logo {
      margin-top: 30px;
    }
    .logo img {
      width: 300px;
      height: auto;
    }
    h1 {
      color: #2980b9;
      margin: 20px 0 10px;
    }
    p.subtitle {
      color: #555;
      margin: 0 0 30px;
    }
    .search-container {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #dceef8;
      border-radius: 30px;
      padding: 10px;
      width: 80%;
      max-width: 700px;
      margin: auto;
      margin-bottom: 20px;
    }
    .search-container input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      padding: 10px 20px;
      font-size: 16px;
    }
    .search-container button {
      background: #f06292;
      border: none;
      padding: 10px 20px;
      color: white;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }
    .languages {
      margin-top: 10px;
    }
    .languages span {
      color: #555;
    }
    .languages a {
      margin: 0 8px;
      color: #2980b9;
      text-decoration: none;
    }
    .languages a:hover {
      text-decoration: underline;
    }

    .admin-area {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }

    .admin-area a {
      background: #2980b9;
      color: white;
      text-decoration: none;
      padding: 8px 14px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .admin-area a:hover {
      background-color: #1f6391;
    }
  </style>
</head>
<body>

  <!-- Area Admin: Lihat Pengguna & Masuk Admin -->
  <div class="admin-area">
    <a href="pengguna.html">LIHAT PENGGUNA</a>
    <a href="login.html">MASUK ADMIN</a>
  </div>

  <div class="logo">
    <img src="logo.png" alt="Logo Perpustakaan">
  </div>
  <h1>Perpustakaan Pribadi</h1>
  <p class="subtitle">masukkan satu atau lebih kata kunci dari judul, penulis, atau kategori</p>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Cari koleksi buku...">
    <button onclick="cariBuku()">PENCARIAN</button>
  </div>

  <div class="languages">
    <span>Pilih Bahasa :</span>
    <a href="#">English</a>
    <a href="#">Indonesia</a>
    <a href="#">Arabic</a>
  </div>

  <script>
    function cariBuku() {
      const keyword = document.getElementById("searchInput").value.toLowerCase();
      localStorage.setItem("kataKunci", keyword);
      window.location.href = "lihat-koleksi.html";
    }

    document.getElementById("searchInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        e.preventDefault();
        cariBuku();
      }
    });
  </script>

</body>
</html>
