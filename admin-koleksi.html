
<!DOCTYPE html>
<html>
<head>
  <title>Admin Koleksi Buku 📚</title>
  <style>
    body {
      font-family: sans-serif;
      background: linear-gradient(135deg, #00C9FF, #92FE9D);
      margin: 0;
      display: flex;
    }
    .sidebar {
      width: 220px;
      background: #00C9FF;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      height: 100vh;
      box-sizing: border-box;
    }
    .sidebar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 12px;
      background: #00bcd4; /* tombol lebih kalem */
      border-radius: 8px;
      text-align: center;
      transition: 0.3s;
    }
    .sidebar a:hover {
      background: #0097a7; /* hover lebih gelap */
      color: white;
    }
    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 16px;
      width: 320px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      margin-bottom: 20px;
    }
    input, select, button {
      padding: 10px;
      margin: 8px 0;
      width: 90%;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    button {
      background: #00C9FF;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: center;
    }
    th {
      background: #00bcd4;
      color: white;
    }
    canvas {
      margin-top: 5px;
    }
    .label {
      display:inline-block;
      padding:10px;
      border:1px solid #ccc;
      margin:8px;
      background:white;
      text-align:center;
      border-radius:8px;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

<div class="sidebar">
  <a href="#" onclick="tampilDaftarBuku()">📚 Daftar Buku</a>
  <a href="#" onclick="tampilForm()">➕ Tambah Buku</a>
  <a href="#" onclick="tampilDaftarAnggota()">👥 Daftar Anggota</a>
  <a href="index.html">📖 Lihat Publik</a>
  <a href="#" onclick="tampilCetakLabel()">🖨️ Cetak Label</a>
  <a href="#" onclick="logout()">🔒 Logout</a>
</div>

<div class="content">

  <div class="card" id="formTambahBuku" style="display:none;">
    <h3>Tambah Buku Baru</h3>
    <input type="text" id="judul" placeholder="Judul Buku">
    <input type="text" id="penulis" placeholder="Penulis">
    <input type="text" id="kategori" placeholder="Kategori">
    <input type="number" id="tahun" placeholder="Tahun Terbit">
    <input type="file" id="gambar">
    <button onclick="simpan()">Simpan Buku</button>
  </div>

  <div id="daftarBukuAdmin">
    <h3>📚 Daftar Buku</h3>
    <table>
      <thead>
        <tr><th>No</th><th>Judul</th><th>Penulis</th><th>Kategori</th><th>Tahun</th><th>Barcode</th><th>Aksi</th></tr>
      </thead>
      <tbody id="tabelDaftarBuku"></tbody>
    </table>
  </div>

  <div id="daftarAnggotaAdmin" style="display:none;">
    <h3>👥 Daftar Anggota</h3>
    <div class="card" style="width:100%; max-width:400px; margin-bottom:20px;">
      <input type="text" id="namaAnggota" placeholder="Nama Anggota">
      <input type="text" id="IDAnggota" placeholder="ID Anggota">
      <input type="text" id="emailAnggota" placeholder="Email Anggota">
      <input type="text" id="alamatAnggota" placeholder="Alamat">
      <input type="text" id="hpAnggota" placeholder="No HP">
      <select id="statusAnggota">
        <option value="">Pilih Status</option>
        <option value="Aktif">Aktif</option>
        <option value="Tidak Aktif">Tidak Aktif</option>
      </select>
      <button onclick="tambahAnggota()">Simpan Anggota</button>
    </div>
    <table>
      <thead>
        <tr><th>No</th><th>Nama</th><th>ID</th><th>Email</th><th>Alamat</th><th>HP</th><th>Status</th><th>Aksi</th></tr>
      </thead>
      <tbody id="tabelDaftarAnggota"></tbody>
    </table>
  </div>

  <div id="cetakLabelAdmin" style="display:none;">
    <h3>🖨️ Cetak Label Buku</h3>
    <button onclick="window.print()">🖨️ Cetak Halaman</button>
    <div id="labelArea"></div>
  </div>

</div>

<script>
if(localStorage.getItem("login") !== "true") window.location.href = "login.html";

window.onload = function(){ tampilDaftarBuku(); }

function logout(){
  localStorage.removeItem("login");
  window.location.href = "login.html";
}

function tampilForm(){
  hideAll();
  document.getElementById("formTambahBuku").style.display = "block";
}

function tampilDaftarBuku(){
  hideAll();
  document.getElementById("daftarBukuAdmin").style.display = "block";
  isiTabelDaftarBuku();
}

function tampilCetakLabel(){
  hideAll();
  document.getElementById("cetakLabelAdmin").style.display = "block";
  isiLabel();
}

function tampilDaftarAnggota(){
  hideAll();
  document.getElementById("daftarAnggotaAdmin").style.display = "block";
  isiTabelAnggota();
}

function hideAll(){
  document.getElementById("formTambahBuku").style.display = "none";
  document.getElementById("daftarBukuAdmin").style.display = "none";
  document.getElementById("cetakLabelAdmin").style.display = "none";
  document.getElementById("daftarAnggotaAdmin").style.display = "none";
}

function simpan(){
  let judul = document.getElementById("judul").value;
  let penulis = document.getElementById("penulis").value;
  let kategori = document.getElementById("kategori").value;
  let tahun = document.getElementById("tahun").value;
  let fileInput = document.getElementById("gambar");

  if(judul && penulis && kategori && tahun && fileInput.files[0]){
    let reader = new FileReader();
    reader.onload = function(e){
      let gambar = e.target.result;
      let books = JSON.parse(localStorage.getItem("books")) || [];
      books.push({judul, penulis, kategori, tahun, gambar});
      localStorage.setItem("books", JSON.stringify(books));
      alert("Buku ditambahkan!");
      tampilDaftarBuku();
    };
    reader.readAsDataURL(fileInput.files[0]);
  }else alert("Isi semua kolom dan pilih gambar!");
}

function isiTabelDaftarBuku(){
  let books = JSON.parse(localStorage.getItem("books")) || [];
  let tbody = document.getElementById("tabelDaftarBuku");
  tbody.innerHTML = "";
  if(books.length === 0){
    tbody.innerHTML = "<tr><td colspan='7'>Tidak ada buku.</td></tr>";
  } else {
    books.forEach((buku, i) => {
      let tr = document.createElement("tr");
      tr.innerHTML = `<td>${i+1}</td><td>${buku.judul}</td><td>${buku.penulis}</td><td>${buku.kategori}</td><td>${buku.tahun}</td>
      <td><canvas id="barcode-${i}"></canvas></td>
      <td><button onclick="editBuku(${i})">✏️</button> <button onclick="hapusBuku(${i})">🗑️</button></td>`;
      tbody.appendChild(tr);
      JsBarcode(`#barcode-${i}`, buku.judul, {format:"CODE128", width:1, height:30, displayValue:false});
    });
  }
}

function editBuku(i){
  let books = JSON.parse(localStorage.getItem("books")) || [];
  let buku = books[i];
  let judul = prompt("Edit Judul:", buku.judul);
  let penulis = prompt("Edit Penulis:", buku.penulis);
  let kategori = prompt("Edit Kategori:", buku.kategori);
  let tahun = prompt("Edit Tahun:", buku.tahun);
  if(judul && penulis && kategori && tahun){
    buku.judul = judul;
    buku.penulis = penulis;
    buku.kategori = kategori;
    buku.tahun = tahun;
    localStorage.setItem("books", JSON.stringify(books));
    tampilDaftarBuku();
  }
}

function hapusBuku(i){
  if(confirm("Hapus buku ini?")){
    let books = JSON.parse(localStorage.getItem("books")) || [];
    books.splice(i, 1);
    localStorage.setItem("books", JSON.stringify(books));
    tampilDaftarBuku();
  }
}

function isiLabel(){
  let books = JSON.parse(localStorage.getItem("books")) || [];
  let area = document.getElementById("labelArea");
  area.innerHTML = "";
  if(books.length === 0){
    area.innerHTML = "<p>Tidak ada buku.</p>";
  } else {
    books.forEach((b,i)=>{
      let div = document.createElement("div");
      div.className = "label";
      div.innerHTML = `<strong>${b.judul}</strong><br><canvas id="label-barcode-${i}"></canvas>`;
      area.appendChild(div);
      JsBarcode(`#label-barcode-${i}`, b.judul, {format:"CODE128", width:1, height:30, displayValue:false});
    });
  }
}

function tambahAnggota(){
  let nama = document.getElementById("namaAnggota").value;
  let email = document.getElementById("emailAnggota").value;
  let alamat = document.getElementById("alamatAnggota").value;
  let hp = document.getElementById("hpAnggota").value;
  let status = document.getElementById("statusAnggota").value;

  if(nama && email && alamat && hp && status){
    let anggota = JSON.parse(localStorage.getItem("anggota")) || [];
    anggota.push({nama, email, alamat, hp, status});
    localStorage.setItem("anggota", JSON.stringify(anggota));
    alert("Anggota ditambahkan!");
    tampilDaftarAnggota();
  } else {
    alert("Lengkapi semua kolom anggota!");
  }
}

function isiTabelAnggota(){
  let anggota = JSON.parse(localStorage.getItem("anggota")) || [];
  let tbody = document.getElementById("tabelDaftarAnggota");
  tbody.innerHTML = "";
  if(anggota.length === 0){
    tbody.innerHTML = "<tr><td colspan='7'>Belum ada anggota.</td></tr>";
  } else {
    anggota.forEach((a,i)=>{
      let tr = document.createElement("tr");
      tr.innerHTML = `<td>${i+1}</td><td>${a.nama}</td><td>${a.email}</td><td>${a.alamat}</td><td>${a.hp}</td><td>${a.status}</td>
      <td><button onclick="hapusAnggota(${i})">🗑️</button></td>`;
      tbody.appendChild(tr);
    });
  }
}

function hapusAnggota(i){
  if(confirm("Hapus anggota ini?")){
    let anggota = JSON.parse(localStorage.getItem("anggota")) || [];
    anggota.splice(i, 1);
    localStorage.setItem("anggota", JSON.stringify(anggota));
    tampilDaftarAnggota();
  }
}
</script>
</body>
</html>
