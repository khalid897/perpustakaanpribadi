<!DOCTYPE html>
<html>
<head>
  <title>Cetak Label Buku 📦</title>
  <style>
    body { font-family: sans-serif; background: linear-gradient(135deg, #00C9FF, #92FE9D); margin: 0; display: flex;}
    .sidebar {
      width: 220px; background: #00C9FF; padding: 20px; display: flex; flex-direction: column; gap: 14px; height: 100vh; box-sizing: border-box;
    }
    .sidebar a {
      color: white; text-decoration: none; font-weight: bold; padding: 12px; background: rgba(255,255,255,0.15);
      border-radius: 8px; text-align: center; transition: 0.3s;
    }
    .sidebar a:hover { background: white; color: #00C9FF; }
    .content { flex: 1; padding: 20px; overflow-y: auto; }
    .label { display: inline-block; padding: 10px; border: 1px solid #ccc; margin: 8px; background: white; text-align: center; border-radius: 8px;}
    canvas { margin-top: 5px;}
    button { padding: 8px 14px; background: #00C9FF; color: white; border: none; border-radius: 6px; margin-bottom: 20px; cursor: pointer;}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>

<div class="sidebar">
  <a href="admin-koleksi.html">➕ Tambah Buku</a>
  <a href="admin-koleksi.html" onclick="event.preventDefault(); window.location='admin-koleksi.html';">📚 Daftar Buku</a>
  <a href="cetak-label.html">🖨️ Cetak Label</a>
  <a href="index.html">📖 Lihat Publik</a>
  <a href="#" onclick="logout()">🔒 Logout</a>
</div>

<div class="content">
  <h2>🖨️ Cetak Label Buku</h2>
  <button onclick="window.print()">🖨️ Cetak Halaman</button>
  <div id="labelArea"></div>
</div>

<script>
if(localStorage.getItem("login") !== "true") window.location.href = "login.html";

function logout(){ localStorage.removeItem("login"); window.location.href = "login.html"; }

let books = JSON.parse(localStorage.getItem("books")) || [];
let area = document.getElementById("labelArea");

if(books.length === 0){
  area.innerHTML = "<p>Tidak ada buku.</p>";
} else {
  books.forEach((buku, index) => {
    let div = document.createElement("div");
    div.className = "label";
    div.innerHTML = `
      <strong>${buku.judul}</strong><br>
      <canvas id="barcode-${index}"></canvas>
    `;
    area.appendChild(div);
    JsBarcode(`#barcode-${index}`, buku.judul, {
      format: "CODE128",
      width: 1,
      height: 30,
      displayValue: false
    });
  });
}
</script>

</body>
</html>
